<div class="pantalla-oscura">
    <form [formGroup]="form()" (ngSubmit)="onSubmit()">
        <h2 style="text-align: center;">Crear cuenta</h2>
        <p style="text-align: center;" class="subtitle">Crea tu usuario con tus datos para luego acceder al sistema</p>
        <div class="form-group">
            <label for="NombreCompleto">Nombre Completo:</label>
            <input type="text" formControlName="NombreCompleto" id="NombreCompleto" name="NombreCompleto"
                placeholder="Ingrese Nombre Completo:">
            <validation [control]="form().controls['NombreCompleto']" name="NombreCompleto" id="NombreCompleto" />
        </div>

        <div class="form-group">
            <label for="Gmail">Gmail:</label>
            <input type="email" formControlName="Gmail" id="Gmail" name="Gmail" placeholder="Ingrese Gmail:">
            <validation [control]="form().controls['Gmail']" name="Gmail" id="Gmail" />
        </div>

        <div class="form-group">
            <label for="PasswordHash">Contraseña:</label>
            <input type="password" formControlName="PasswordHash" id="PasswordHash" name="PasswordHash"
                placeholder="Ingrese Contraseña:">
            <validation [control]="form().controls['PasswordHash']" name="PasswordHash" id="PasswordHash" />
        </div>

        <button type="submit">Guardar</button>
    </form>
</div>
